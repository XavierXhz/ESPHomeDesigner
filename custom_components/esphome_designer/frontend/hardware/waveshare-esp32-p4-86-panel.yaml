# ============================================================================
# ESPHome YAML - Generated by ESPHome Designer
# ============================================================================
# TARGET DEVICE: Waveshare ESP32-P4-86-Panel 720x720
#         - Display Platform: mipi_dsi
#         - Touchscreen: GT911 (I2C)
#         - PSRAM: Yes (Hex, 200MHz)
#         - Framework: ESP-IDF with experimental ESP32-P4 features
# Name: Waveshare ESP32-P4-86-Panel
# Resolution: 720x720
# Shape: rect
# Chip: esp32-p4
# Board: esp32-p4-evboard
# ============================================================================
#
# HARDWARE NOTES:
#         - ESP32-P4 boards do not have built-in WiFi. This board uses an
#           ESP32-C6 companion over SDIO, configured below via esp32_hosted.
#         - esp_ldo channel 3 powers the MIPI display rail.
#         - GPIO26 drives the display backlight PWM (inverted).
#         - ES8311 audio codec is wired on the shared I2C bus and I2S pins.
#
# SETUP INSTRUCTIONS:
#
# STEP 1: Create a new device in ESPHome
#         - Click "New Device"
#         - Select: ESP32-P4
#         - Board: esp32-p4-evboard
#         - Framework: ESP-IDF (Required)
#
# STEP 2: PASTE this snippet into your device YAML
#         - Paste this snippet at the end of your configuration.
#         - System sections (esphome, esp32, esp32_hosted, psram, esp_ldo)
#           are included because they are required for this board to boot,
#           connect to WiFi, and power the display.
#
# ============================================================================

esphome:
  min_version: 2026.5.0
  project:
    name: "Waveshare.ESP32-P4-86-Panel"
    version: "1.0"

esp32:
  board: esp32-p4-evboard
  variant: esp32p4
  cpu_frequency: 360MHz
  flash_size: 32MB
  framework:
    type: esp-idf
    advanced:
      execute_from_psram: true
      enable_idf_experimental_features: true

esp_ldo:
  - channel: 3
    voltage: 2.5V

psram:
  mode: hex
  speed: 200MHz

preferences:
  flash_write_interval: 5min

esp32_hosted:
  variant: ESP32C6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  active_high: true

i2c:
  - id: i2c_bus_a
    sda: GPIO7
    scl: GPIO8
    scan: false
    frequency: 400kHz

output:
  - platform: ledc
    pin: GPIO26
    id: gpio_backlight_pwm
    frequency: 100Hz
    inverted: true
    min_power: 0.1
    max_power: 0.8

light:
  - platform: monochromatic
    id: display_backlight
    name: Backlight
    output: gpio_backlight_pwm
    restore_mode: ALWAYS_ON

touchscreen:
  - platform: gt911
    id: my_touchscreen
    i2c_id: i2c_bus_a
    display: my_display
    on_release:
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:
            - light.turn_on: display_backlight

display:
  - platform: mipi_dsi
    id: my_display
    model: WAVESHARE-P4-86-PANEL
    # __LAMBDA_PLACEHOLDER__
